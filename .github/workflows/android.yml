name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create gradle/wrapper directory
      run: mkdir -p gradle/wrapper

    - name: Download Gradle Wrapper JAR
      run: |
        cd gradle/wrapper
        curl -L -o gradle-8.5-bin.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -j gradle-8.5-bin.zip gradle-8.5/lib/gradle-wrapper.jar
        rm gradle-8.5-bin.zip
        cd ../..

    - name: Verify gradle-wrapper.jar exists
      run: ls -lh gradle/wrapper/gradle-wrapper.jar

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
