name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create gradle/wrapper directory
      run: mkdir -p gradle/wrapper

    - name: Download Gradle Distribution
      run: |
        cd gradle/wrapper
        echo "Downloading Gradle 8.5..."
        curl -L -o gradle-8.5-bin.zip https://services.gradle.org/distributions/gradle-8.5-bin.zip
        echo "Extracting Gradle..."
        unzip -q gradle-8.5-bin.zip
        echo "Files in extracted directory:"
        find gradle-8.5 -name "gradle-wrapper.jar" -type f
        echo "Copying gradle-wrapper.jar..."
        cp gradle-8.5/lib/gradle-wrapper.jar .
        echo "Cleaning up..."
        rm -rf gradle-8.5 gradle-8.5-bin.zip
        echo "Verifying gradle-wrapper.jar..."
        ls -lh gradle-wrapper.jar
        cd ../..

    - name: Verify gradle-wrapper.jar exists
      run: |
        if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "✓ gradle-wrapper.jar found"
          ls -lh gradle/wrapper/gradle-wrapper.jar
        else
          echo "✗ gradle-wrapper.jar NOT found"
          exit 1
        fi

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
