name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Create gradle/wrapper directory
      run: mkdir -p gradle/wrapper

    - name: Download gradle-wrapper.jar directly from Gradle GitHub
      run: |
        cd gradle/wrapper
        echo "Downloading gradle-wrapper.jar from official Gradle repository..."
        curl -L -o gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.5/gradle/wrapper/gradle-wrapper.jar
        echo "Verifying download..."
        ls -lh gradle-wrapper.jar
        file gradle-wrapper.jar
        cd ../..

    - name: Verify gradle-wrapper.jar exists and is valid
      run: |
        if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
          SIZE=$(stat -c%s gradle/wrapper/gradle-wrapper.jar)
          echo "✓ gradle-wrapper.jar found (Size: $SIZE bytes)"
          if [ $SIZE -lt 100000 ]; then
            echo "✗ Error: File size is too small, download may have failed"
            exit 1
          fi
        else
          echo "✗ gradle-wrapper.jar NOT found"
          exit 1
        fi

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
